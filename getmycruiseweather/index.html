<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Get My Cruise Weather</title>
  
  
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=clab-20260713" />

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WWSLWME6WY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-WWSLWME6WY');
</script>

</head>
<body>
  <main class="page">
    <header class="brand">
      <img src="assets/logo.png" class="brand__logo" alt="Get My Cruise Weather" />
      
<div class="brand__rule" aria-hidden="true"></div>
    </header>

    <section class="hero">
      
<h1 class="hero__title">Historical weather for your cruise ports<br>on the date you’ll be there</h1>

    </section>

    <section class="card card--form" aria-label="Port and date">
      <div class="formgrid">
        
        <div class="field">
          <label for="regionSelect">Region</label>
          <select id="regionSelect" class="select">
            <option value="">Select a region</option>
            <option value="Europe">Europe</option>
            <option value="Caribbean">Caribbean</option>
            <option value="North America">North America</option>
            <option value="South America">South America</option>
            <option value="Asia">Asia</option>
            <option value="Oceania">Oceania</option>
            <option value="Africa">Africa</option>
</select>
        </div>

<div class="field" id="portField" style="display:none">
          <label class="label" for="portSelect">Port</label>
          <div class="selectwrap">
            <select id="portSelect" class="select">
              <!-- populated by JS -->
            </select>
            <span class="chev" aria-hidden="true"></span>
          </div>
        </div>

        <div class="field">
          <label class="label" for="dateInput">Date of visit</label>
          <div class="datewrap">
            <input id="dateInput" class="input" type="date" />
            <span class="cal" aria-hidden="true"></span>
          </div>
        </div>
      </div>

      <button id="analyseBtn" class="btn btn--primary" type="button" disabled>Analyse My Port</button>
    </section>
  <footer class="clab-footer">
      <a class="clab-badge" href="https://thecruiselab.com">
        <svg class="clab-badge__flask" viewBox="0 0 100 110" aria-hidden="true">
          <path d="M42 12 h16 v26 l24 46 c4 8 -2 18 -11 18 H29 c-9 0 -15 -10 -11 -18 l24 -46 z" fill="none" stroke="#d9b45c" stroke-width="6" stroke-linejoin="round"/>
          <path d="M38 12 h24" stroke="#d9b45c" stroke-width="6" stroke-linecap="round"/>
        </svg>
        <span class="clab-badge__text">Part of <b>The Cruise Lab</b></span>
      </a>
      <p class="clab-foot-note">Explore more tools at <a href="https://thecruiselab.com">thecruiselab.com</a></p>
    </footer>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
